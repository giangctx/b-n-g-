<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KHTN 9: Năng Lượng Vũ Trụ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050510;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            max-height: 850px;
            background: radial-gradient(circle at center, #111432 0%, #04040c 100%);
            border: 2px solid #4a4e69;
            box-shadow: 0 0 40px rgba(74, 78, 105, 0.4);
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .hud-item {
            background: rgba(15, 23, 42, 0.7);
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #334155;
        }

        .hud-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; }
        .hud-value { font-size: 16px; font-weight: bold; color: #38bdf8; }
        #lives-value { color: #f43f5e; }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Menu Bắt đầu / Chuyển Chặng / Tổng kết */
        #menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 15, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 150;
            padding: 30px;
            box-sizing: border-box;
            text-align: center;
        }

        #menu-title {
            font-size: 26px;
            font-weight: 800;
            color: #38bdf8;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.6);
        }

        #menu-report {
            font-size: 14px;
            color: #cbd5e1;
            margin-bottom: 30px;
            line-height: 1.6;
            background: rgba(30, 41, 59, 0.6);
            padding: 18px;
            border-radius: 8px;
            border: 1px solid #334155;
            width: 90%;
            box-sizing: border-box;
            text-align: left;
        }

        .primary-btn {
            background: linear-gradient(135deg, #38bdf8 0%, #0369a1 100%);
            border: none;
            color: white;
            padding: 14px 32px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .primary-btn:active { transform: scale(0.95); }

        /* Giao diện câu hỏi cứu hộ */
        #quiz-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(3, 7, 18, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        #quiz-overlay.active { display: flex; }

        #danger-title {
            color: #ef4444;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        #timer-container {
            width: 100%;
            background-color: #334155;
            height: 6px;
            border-radius: 3px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #eab308, #ef4444);
            transition: width 0.1s linear;
        }

        #timer-text {
            font-size: 14px;
            color: #eab308;
            font-weight: bold;
            margin-bottom: 15px;
        }

        #question-box {
            background: #1e1b4b;
            border: 2px solid #4338ca;
            padding: 18px;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 20px;
            width: 100%;
            box-sizing: border-box;
            text-align: left;
        }

        .answers-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .answer-card {
            background: #111827;
            border: 1px solid #374151;
            color: #e5e7eb;
            padding: 14px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            width: 100%;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        .answer-card.correct { background-color: #065f46 !important; border-color: #10b981 !important; }
        .answer-card.wrong { background-color: #991b1b !important; border-color: #ef4444 !important; }

        #controls-guide {
            position: absolute;
            bottom: 8px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 11px;
            color: #4b5563;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud">
            <div id="score-box" class="hud-item"><div class="hud-label">Điểm</div><div id="score-value" class="hud-value">0</div></div>
            <div class="hud-item"><div class="hud-label">Mạng</div><div id="lives-value" class="hud-value">❤️ 5</div></div>
            <div class="hud-item"><div class="hud-label">Chặng</div><div id="wave-value" class="hud-value">1</div></div>
        </div>

        <div id="menu-overlay">

            <button id="start-btn" class="primary-btn" onclick="startNextWave()">BẮT ĐẦU CHẶNG 1</button>
        </div>

        <canvas id="spaceCanvas"></canvas>

        <div id="quiz-overlay">
            <div id="danger-title">⚡ NĂNG LƯỢNG SUY GIẢM!</div>
            
            <div id="timer-container"><div id="timer-bar"></div></div>
            <div id="timer-text">Thời gian còn lại: 30s</div>

            <div id="question-box">Đang tải...</div>
            <div class="answers-grid">
                <button class="answer-card" onclick="submitAnswer(0)">Đáp án A</button>
                <button class="answer-card" onclick="submitAnswer(1)">Đáp án B</button>
                <button class="answer-card" onclick="submitAnswer(2)">Đáp án C</button>
                <button class="answer-card" onclick="submitAnswer(3)">Đáp án D</button>
            </div>
        </div>
