<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KHTN 9: Năng Lượng Vũ Trụ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050510;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            max-height: 850px;
            background: radial-gradient(circle at center, #111432 0%, #04040c 100%);
            border: 2px solid #4a4e69;
            box-shadow: 0 0 40px rgba(74, 78, 105, 0.4);
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .hud-item {
            background: rgba(15, 23, 42, 0.7);
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #334155;
        }

        .hud-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; }
        .hud-value { font-size: 16px; font-weight: bold; color: #38bdf8; }
        #lives-value { color: #f43f5e; }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Menu Bắt đầu / Chuyển Chặng / Tổng kết */
        #menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 15, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 150;
            padding: 30px;
            box-sizing: border-box;
            text-align: center;
        }

        #menu-title {
            font-size: 26px;
            font-weight: 800;
            color: #38bdf8;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.6);
        }

        #menu-report {
            font-size: 14px;
            color: #cbd5e1;
            margin-bottom: 30px;
            line-height: 1.6;
            background: rgba(30, 41, 59, 0.6);
            padding: 18px;
            border-radius: 8px;
            border: 1px solid #334155;
            width: 90%;
            box-sizing: border-box;
            text-align: left;
        }

        .primary-btn {
            background: linear-gradient(135deg, #38bdf8 0%, #0369a1 100%);
            border: none;
            color: white;
            padding: 14px 32px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .primary-btn:active { transform: scale(0.95); }

        /* Giao diện câu hỏi cứu hộ */
        #quiz-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(3, 7, 18, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        #quiz-overlay.active { display: flex; }

        #danger-title {
            color: #ef4444;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        #timer-container {
            width: 100%;
            background-color: #334155;
            height: 6px;
            border-radius: 3px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #eab308, #ef4444);
            transition: width 0.1s linear;
        }

        #timer-text {
            font-size: 14px;
            color: #eab308;
            font-weight: bold;
            margin-bottom: 15px;
        }

        #question-box {
            background: #1e1b4b;
            border: 2px solid #4338ca;
            padding: 18px;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 20px;
            width: 100%;
            box-sizing: border-box;
            text-align: left;
        }

        .answers-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .answer-card {
            background: #111827;
            border: 1px solid #374151;
            color: #e5e7eb;
            padding: 14px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            width: 100%;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        .answer-card.correct { background-color: #065f46 !important; border-color: #10b981 !important; }
        .answer-card.wrong { background-color: #991b1b !important; border-color: #ef4444 !important; }

        #controls-guide {
            position: absolute;
            bottom: 8px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 11px;
            color: #4b5563;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud">
            <div class="hud-item"><div class="hud-label">Điểm</div><div id="score-value" class="hud-value">0</div></div>
            <div class="hud-item"><div class="hud-label">Mạng</div><div id="lives-value" class="hud-value">❤️ 5</div></div>
            <div class="hud-item"><div class="hud-label">Chặng</div><div id="wave-value" class="hud-value">1</div></div>
        </div>

        <div id="menu-overlay">
            <div id="menu-title">NĂNG LƯỢNG VŨ TRỤ KHTN 9</div>
            <div id="menu-report">Chào mừng bạn đến với thử thách Cơ học! Tránh né bầy gà tinh vân và giải mã các bài toán để bảo vệ Trái Đất.</div>
            <button id="start-btn" class="primary-btn" onclick="startNextWave()">BẮT ĐẦU CHẶNG 1</button>
        </div>

        <canvas id="spaceCanvas"></canvas>

        <div id="quiz-overlay">
            <div id="danger-title">⚡ NĂNG LƯỢNG SUY GIẢM!</div>
            
            <div id="timer-container"><div id="timer-bar"></div></div>
            <div id="timer-text">Thời gian còn lại: 45s</div>

            <div id="question-box">Đang tải...</div>
            <div class="answers-grid">
                <button class="answer-card" onclick="submitAnswer(0)">Đáp án A</button>
                <button class="answer-card" onclick="submitAnswer(1)">Đáp án B</button>
                <button class="answer-card" onclick="submitAnswer(2)">Đáp án C</button>
                <button class="answer-card" onclick="submitAnswer(3)">Đáp án D</button>
            </div>
        </div>

        <div id="controls-guide">Chạm & Vuốt để lái phi thuyền (Trứng rơi x2 kịch tính!)</div>
    </div>

    <script>
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');

        const WIDTH = 480;
        const HEIGHT = 800;
        canvas.width = WIDTH;
        canvas.height = HEIGHT;

        // Trạng thái các biến số hệ thống game
        let score = 0;
        let lives = 5; // YÊU CẦU: Khởi tạo 5 mạng sống
        let wave = 1;
        let isQuizMode = false;
        let isMenuMode = true;
        let selectedQuiz = null;
        let lastShotTime = 0;
        const SHOT_DELAY = 220;

        // Các biến phục vụ thống kê báo cáo
        let gameStartTime = 0;
        let totalElapsedSeconds = 0;
        let correctAnswersCount = 0;
        let wrongAnswersCount = 0;
        let totalQuestionsAnswered = 0;

        // Biến hiệu ứng chữ nổi +50đ
        let scorePopups = [];

        // Logic đếm ngược 45 giây câu hỏi
        let quizTimer = null;
        let timeRemaining = 45;
        const QUIZ_TIME_LIMIT = 45;

        // Bộ synthesizer âm thanh (Web Audio API không cần file ngoài)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playExplosionSound() {
            try {
                // Giúp giả lập tiếng nổ "Bùm" trầm ấm bằng nhiễu âm tần số thấp
                let bufferSize = audioCtx.sampleRate * 0.4,
                    buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate),
                    data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                let noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                let filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(400, audioCtx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.4);
                let gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
                noise.start();
            } catch(e) {}
        }

        const physicsQuestionBank = [
            { q: "Động năng của một vật là năng lượng vật có được do yếu tố nào?", a: ["Vật có khối lượng lớn", "Vật đang ở trên cao", "Vật đang chuyển động", "Vật bị biến dạng"], c: 2 },
            { q: "Công thức toán học nào sau đây dùng để tính động năng của một vật?", a: ["Wđ = m.v", "Wđ = m.g.h", "Wđ = 1/2 m.v²", "Wđ = 1/2 m.v"], c: 2 },
            { q: "In công thức tính động năng, vận tốc của vật được đo bằng đơn vị nào sau đây?", a: ["km/h", "m/s", "m/s²", "cm/s"], c: 1 },
            { q: "Nếu khối lượng của một vật tăng lên 2 lần và vận tốc giữ nguyên thì động năng của vật thay đổi thế nào?", a: ["Tăng 2 lần", "Tăng 4 lần", "Giảm 2 lần", "Không đổi"], c: 0 },
            { q: "Một chiếc xe máy và một chiếc xe tải cùng chạy với vận tốc 40 km/h. Xe nào có động năng lớn hơn?", a: ["Xe máy vì nhỏ gọn hơn", "Xe tải vì có khối lượng lớn hơn", "Hai xe có động năng bằng nhau", "Không so sánh được"], c: 1 },
            { q: "Đơn vị chính thống nào sau đây dùng để đo động năng, thế năng và cơ năng?", a: ["Oát (W)", "Niutơn (N)", "Jun (J)", "Mã lực (HP)"], c: 2 },
            { q: "Khi một vật đang đứng yên thì động năng của vật đó bằng bao nhiêu?", a: ["Bằng 0", "Bằng giá trị thế năng", "Bằng hằng số lớn hơn 0", "Cực đại"], c: 0 },
            { q: "Một bạn học sinh có khối lượng 40 kg đang chạy với vận tốc 2 m/s. Động năng của bạn đó là bao nhiêu?", a: ["40 J", "80 J", "160 J", "20 J"], c: 1 },
            { q: "Một viên đạn năng lượng có khối lượng 0,1 kg bay với vận tốc 10 m/s. Động năng của viên đạn là:", a: ["1 J", "5 J", "0.5 J", "10 J"], c: 2 },
            { q: "Khi một vật chuyển động chậm dần đều do ma sát, động năng của vật sẽ biến đổi thế nào?", a: ["Tăng dần", "Giảm dần", "Không thay đổi", "Bằng thế năng"], c: 1 },
            { q: "Thế năng trọng trường của một vật là năng lượng có được do:", a: ["Vật đang chuyển động nhanh", "Vị trí của vật so với mặt đất (hoặc mốc chọn)", "Vật bị nén hoặc kéo dãn", "Nhiệt độ của vật tăng cao"], c: 1 },
            { q: "Công thức tính thế năng trọng trường của một vật ở độ cao h là gì?", a: ["Wt = m.v", "Wt = 1/2 m.v²", "Wt = m.g.h", "Wt = 1/2 m.g.h"], c: 2 },
            { q: "Thế năng trọng trường của một vật phụ thuộc vào những đại lượng nào?", a: ["Khối lượng và vận tốc", "Khối lượng và độ cao", "Vận tốc và độ cao", "Kích thước của vật"], c: 1 },
            { q: "Nếu chọn mặt đất làm mốc tính thế năng, một vật nằm ngay trên mặt đất sẽ có thế năng bằng bao nhiêu?", a: ["Bằng 0", "Cực đại", "Nhỏ hơn 0", "Chưa xác định được"], c: 0 },
            { q: "Một quả dừa có khối lượng 1 kg đang ở trên cây cách mặt đất 6m. Lấy g = 10 m/s². Thế năng của quả dừa là:", a: ["6 J", "16 J", "60 J", "600 J"], c: 2 },
            { q: "Hai vật có khối lượng m1 > m2 được đặt ở cùng một độ cao so với mặt đất. Vật nào có thế năng lớn hơn?", a: ["Vật 1", "Vật 2", "Hai vật bằng nhau", "Không thể so sánh"], c: 0 },
            { q: "Khi đưa một vật lên độ cao lớn hơn so với mốc thế năng, thế năng trọng trường của vật sẽ:", a: ["Giảm đi", "Tăng lên", "Không thay đổi", "Bằng 0"], c: 1 },
            { q: "Đại lượng 'h' trong công thức thế năng trọng trường Wt = mgh được gọi là gì?", a: ["Vận tốc của vật", "Khối lượng của vật", "Độ cao của vật so với mốc", "Gia tốc rơi tự do"], c: 2 },
            { q: "Một thùng hàng nặng 10 kg đặt trên tầng lửng cao 2m so với sàn nhà (chọn sàn làm mốc). Lấy g=10m/s², thế năng của thùng là:", a: ["20 J", "100 J", "200 J", "2000 J"], c: 2 },
            { q: "Thế năng trọng trường sẽ thay đổi thế nào nếu ta chọn mốc thế năng ở vị trí cao hơn vị trí vật?", a: ["Thế năng sẽ có giá trị âm (<0)", "Thế năng sẽ bằng 0", "Thế năng tăng gấp đôi", "Thế năng luôn dương"], c: 0 },
            { q: "Cơ năng của một vật chuyển động trong trọng trường được tính bằng biểu thức nào?", a: ["Tổng động năng và thế năng", "Hiệu giữa động năng và thế năng", "Tích của động năng và thế năng", "Thương của động năng và thế năng"], c: 0 },
            { q: "Khi một quả trứng gà rơi tự do từ trên cao xuống đất, dạng năng lượng nào đã chuyển hóa thành dạng nào?", a: ["Động năng chuyển hóa thành thế năng", "Thế năng chuyển hóa thành động năng", "Cơ năng chuyển hóa thành động năng", "Nhiệt năng chuyển hóa thành thế năng"], c: 1 },
            { q: "Nếu bỏ qua mọi lực cản và ma sát, cơ năng của một vật trong quá trình chuyển động sẽ:", a: ["Luôn tăng dần", "Luôn giảm dần", "Được bảo toàn (không đổi)", "Bằng 0"], c: 2 },
            { q: "Trong quá trình ném một viên sỏi thẳng đứng từ dưới lên cao, động năng và thế năng thay đổi thế nào?", a: ["Động năng tăng, thế năng giảm", "Động năng giảm, thế năng tăng", "Cả hai cùng tăng", "Cả hai cùng giảm"], c: 1 },
            { q: "Tại vị trí cao nhất mà vật đạt được khi được ném thẳng đứng lên cao (vận tốc v = 0) thì:", a: ["Động năng cực đại, thế năng bằng 0", "Thế năng cực đại, động năng bằng 0", "Cơ năng của vật bằng 0", "Động năng bằng thế năng"], c: 1 },
            { q: "Một vật có động năng là 40 J và thế năng là 60 J. Cơ năng toàn phần của vật đó bằng bao nhiêu?", a: ["20 J", "100 J", "2400 J", "50 J"], c: 1 },
            { q: "Khi một vật vừa chạm đất (mốc thế năng), năng lượng của vật tồn tại chủ yếu dưới dạng nào?", a: ["Thế năng trọng trường cực đại", "Động năng cực đại", "Cơ năng bằng 0", "Hóa năng"], c: 1 },
            { q: "Hiện tượng cơ năng chuyển hóa một phần thành nhiệt năng trong thực tế thường do yếu tố nào gây ra?", a: ["Lực trọng trường", "Lực ma sát, lực cản không khí", "Khối lượng vật quá lớn", "Vận tốc vật quá nhanh"], c: 1 },
            { q: "Một mũi tên được bắn ra từ một chiếc cung đã kéo căng. Năng lượng ban đầu của chiếc cung tồn tại dưới dạng nào?", a: ["Động năng", "Thế năng đàn hồi", "Thế năng trọng trường", "Cơ năng chuyển động"], c: 1 },
            { q: "Nếu một vật rơi từ trên cao xuống và cơ năng được bảo toàn, khi thế năng giảm đi 15 J thì động năng sẽ:", a: ["Giảm đi 15 J", "Tăng thêm 15 J", "Tăng thêm 30 J", "Không thay đổi"], c: 1 }
        ];

        const player = { x: WIDTH / 2, y: HEIGHT - 80, width: 50, height: 40 };
        let bullets = []; let chickens = []; let eggs = []; let particles = [];
        let localQuestionBank = [...physicsQuestionBank];

        function handleTouch(e) {
            if (isQuizMode || isMenuMode) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const scaleX = WIDTH / rect.width;
            const touchX = (touch.clientX - rect.left) * scaleX;
            player.x = Math.max(player.width/2, Math.min(WIDTH - player.width/2, touchX));
        }

        canvas.addEventListener('touchstart', handleTouch, {passive: false});
        canvas.addEventListener('touchmove', handleTouch, {passive: false});

        canvas.addEventListener('mousemove', (e) => {
            if (isQuizMode || isMenuMode) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = WIDTH / rect.width;
            player.x = Math.max(player.width/2, Math.min(WIDTH - player.width/2, (e.clientX - rect.left) * scaleX));
        });

        function startNextWave() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (gameStartTime === 0) gameStartTime = Date.now(); // Ghi nhận thời gian bắt đầu chơi thực tế
            
            isMenuMode = false;
            document.getElementById('menu-overlay').style.display = 'none';
            spawnChickenFleet();
        }

        function formatTime(seconds) {
            let m = Math.floor(seconds / 60);
            let s = Math.floor(seconds % 60);
            return `${m} phút ${s} giây`;
        }

        function triggerWaveComplete() {
            isMenuMode = true;
            bullets = []; eggs = [];
            totalElapsedSeconds = (Date.now() - gameStartTime) / 1000;

            document.getElementById('menu-title').innerText = `🎉 HOÀN THÀNH CHẶNG ${wave}!`;
            document.getElementById('menu-report').innerHTML = `
                <b>BÁO CÁO TIẾN ĐỘ THỰC HIỆN:</b><br><br>
                - Số chặng đã vượt qua: <b>Chặng ${wave}</b><br>
                - Tổng điểm tích lũy: <span style="color:#38bdf8;">${score} điểm</span><br>
                - Tổng thời gian đã chơi: <b>${formatTime(totalElapsedSeconds)}</b><br>
                - Số câu trả lời ĐÚNG: <span style="color:#10b981;">${correctAnswersCount} câu</span><br>
                - Số câu trả lời SAI: <span style="color:#ef4444;">${wrongAnswersCount} câu</span><br>
                - Số mạng còn lại: ${'❤️'.repeat(lives)}
            `;
            wave++;
            document.getElementById('wave-value').innerText = wave;
            document.getElementById('start-btn').innerText = `BẮT ĐẦU CHẶNG ${wave}`;
            document.getElementById('menu-overlay').style.display = 'flex';
        }

        function triggerGameOver(isUltimateWin = false) {
            clearInterval(quizTimer);
            isMenuMode = true;
            totalElapsedSeconds = (Date.now() - gameStartTime) / 1000;

            if (isUltimateWin) {
                document.getElementById('menu-title').innerText = `🏆 XUẤT SẮC! BẠN ĐÃ CHIẾN THẮNG!`;
            } else {
                document.getElementById('menu-title').innerText = `💥 TRẬN ĐẤU KẾT THÚC!`;
            }

            document.getElementById('menu-report').innerHTML = `
                <b style="color:#eab308; font-size:15px;">BÁO CÁO TỔNG KẾT TOÀN DIỆN:</b><br><br>
                - Số chặng hoàn thành: <b>${wave - 1} chặng</b><br>
                - Tổng số điểm đạt được: <span style="color:#38bdf8; font-size:16px; font-weight:bold;">${score} điểm</span><br>
                - Tổng thời gian tham gia: <b>${formatTime(totalElapsedSeconds)}</b><br><br>
                - Tổng số câu đã tương tác: <b>${totalQuestionsAnswered} câu</b><br>
                - Trả lời ĐÚNG: <span style="color:#10b981; font-weight:bold;">${correctAnswersCount} câu</span><br>
                - Trả lời SAI: <span style="color:#ef4444; font-weight:bold;">${wrongAnswersCount} câu</span>
            `;

            // Reset toàn bộ chỉ số cho lần chơi tiếp theo
            score = 0; lives = 5; wave = 1;
            correctAnswersCount = 0; wrongAnswersCount = 0; totalQuestionsAnswered = 0;
            gameStartTime = 0;
            localQuestionBank = [...physicsQuestionBank];

            document.getElementById('score-value').innerText = score;
            document.getElementById('wave-value').innerText = wave;
            document.getElementById('lives-value').innerText = `❤️ 5`;
            document.getElementById('start-btn').innerText = "CHƠI LẠI TỪ ĐẦU";
            document.getElementById('menu-overlay').style.display = 'flex';
        }

        function spawnChickenFleet() {
            chickens = []; eggs = [];
            const rows = 4; const cols = 6;
            const startX = 55; const startY = 90;
            const spacingX = 70; const spacingY = 55;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    chickens.push({
                        x: startX + c * spacingX, y: startY + r * spacingY,
                        width: 36, height: 32, direction: 1,
                        speed: 1.2 + (wave * 0.25),
                        dropChance: 0.004 + (wave * 0.002)
                    });
                }
            }
        }

        function createExplosion(x, y, color) {
            for(let i=0; i<10; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 0.5) * 5,
                    radius: Math.random() * 2 + 1, alpha: 1, color: color
                });
            }
        }

        function update() {
            if (isQuizMode || isMenuMode) return;

            let currentTime = Date.now();
            if (currentTime - lastShotTime > SHOT_DELAY) {
                bullets.push({ x: player.x, y: player.y - 20, speed: 11, radius: 3 });
                lastShotTime = currentTime;
            }

            for (let b = bullets.length - 1; b >= 0; b--) {
                bullets[b].y -= bullets[b].speed;
                if (bullets[b].y < 0) bullets.splice(b, 1);
            }

            let shiftDown = false;
            chickens.forEach(chick => {
                chick.x += chick.speed * chick.direction;
                if (chick.x + chick.width/2 > WIDTH - 15 || chick.x - chick.width/2 < 15) shiftDown = true;
                if (Math.random() < chick.dropChance) eggs.push({ x: chick.x, y: chick.y + 10, vy: 1.5, gravity: 0.09 });
            });

            if (shiftDown) {
                chickens.forEach(chick => { chick.direction *= -1; chick.y += 15; });
            }

            for (let e = eggs.length - 1; e >= 0; e--) {
                eggs[e].vy += eggs[e].gravity;
                eggs[e].y += eggs[e].vy;
                if (eggs[e].y > HEIGHT) { eggs.splice(e, 1); continue; }

                // Khi quả trứng va chạm trúng máy bay người chơi
                if (Math.abs(eggs[e].x - player.x) < player.width/2 + 5 && Math.abs(eggs[e].y - player.y) < player.height/2 + 6) {
                    eggs.splice(e, 1);
                    playExplosionSound(); // YÊU CẦU: Kêu bùm khi máy bay nổ
                    triggerPlayerHit();
                }
            }

            for (let b = bullets.length - 1; b >= 0; b--) {
                for (let c = chickens.length - 1; c >= 0; c--) {
                    if (Math.abs(bullets[b].x - chickens[c].x) < chickens[c].width/2 && Math.abs(bullets[b].y - chickens[c].y) < chickens[c].height/2) {
                        createExplosion(chickens[c].x, chickens[c].y, '#10b981');
                        chickens.splice(c, 1); bullets.splice(b, 1);
                        score += 20; // Bắn hạ mỗi con gà cộng 20đ nền
                        document.getElementById('score-value').innerText = score;
                        break;
                    }
                }
            }

            for(let p = particles.length - 1; p >= 0; p--) {
                particles[p].x += particles[p].vx; particles[p].y += particles[p].vy;
                particles[p].alpha -= 0.02;
                if(particles[p].alpha <= 0) particles.splice(p, 1);
            }

            // Xử lý chữ nổi +50đ bay lên
            for (let s = scorePopups.length - 1; s >= 0; s--) {
                scorePopups[s].y -= 1.5;
                scorePopups[s].alpha -= 0.02;
                if (scorePopups[s].alpha <= 0) scorePopups.splice(s, 1);
            }

            if (chickens.length === 0) { 
                triggerWaveComplete(); 
            }
            
            chickens.forEach(chick => { 
                if (chick.y + chick.height/2 > player.y - player.height/2) {
                    playExplosionSound();
                    triggerPlayerHit();
                }
            });
        }

        function triggerPlayerHit() {
            createExplosion(player.x, player.y, '#ef4444');
            isQuizMode = true;

            // KIỂM TRA ĐIỀU KIỆN CHIẾN THẮNG TUYỆT ĐỐI (Hết sạch 30 câu hỏi)
            if (totalQuestionsAnswered >= 30 || localQuestionBank.length === 0) {
                triggerGameOver(true);
                return;
            }

            const randomIndex = Math.floor(Math.random() * localQuestionBank.length);
            selectedQuiz = localQuestionBank.splice(randomIndex, 1)[0];
            totalQuestionsAnswered++;

            document.getElementById('question-box').innerText = selectedQuiz.q;
            const buttons = document.querySelectorAll('.answer-card');
            buttons.forEach((btn, index) => {
                btn.innerText = `${String.fromCharCode(65 + index)}. ${selectedQuiz.a[index]}`;
                btn.className = 'answer-card'; btn.style.pointerEvents = 'auto';
            });

            timeRemaining = QUIZ_TIME_LIMIT;
            updateTimerUI();
            document.getElementById('quiz-overlay').classList.add('active');

            quizTimer = setInterval(() => {
                timeRemaining--;
                updateTimerUI();
                if (timeRemaining <= 0) {
                    clearInterval(quizTimer);
                    wrongAnswersCount++;
                    handleTimeOut();
                }
            }, 1000);
        }

        function updateTimerUI() {
            document.getElementById('timer-text').innerText = `Thời gian còn lại: ${timeRemaining}s`;
            const percentage = (timeRemaining / QUIZ_TIME_LIMIT) * 100;
            document.getElementById('timer-bar').style.width = `${percentage}%`;
        }

        function handleTimeOut() {
            const buttons = document.querySelectorAll('.answer-card');
            buttons.forEach(btn => btn.style.pointerEvents = 'none');
            buttons[selectedQuiz.c].classList.add('correct');
            setTimeout(() => { resumeGame(true); }, 2000);
        }

        function submitAnswer(index) {
            clearInterval(quizTimer);
            const buttons = document.querySelectorAll('.answer-card');
            buttons.forEach(btn => btn.style.pointerEvents = 'none');
            
            if (index === selectedQuiz.c) {
                // TRẢ LỜI ĐÚNG: Cộng 50đ và kích hoạt chữ nổi
                correctAnswersCount++;
                score += 50; 
                document.getElementById('score-value').innerText = score;
                
                // Thêm vào danh sách chữ nổi
                scorePopups.push({ x: player.x, y: player.y - 30, text: "+50", alpha: 1 });

                buttons[index].classList.add('correct');
                setTimeout(() => { resumeGame(false); }, 1000);
            } else {
                // TRẢ LỜI SAI
                wrongAnswersCount++;
                buttons[index].classList.add('wrong'); 
                buttons[selectedQuiz.c].classList.add('correct');
                setTimeout(() => { resumeGame(true); }, 2000);
            }
        }

        function resumeGame(deductLife) {
            if (deductLife) {
                lives--;
                if(lives <= 0) {
                    triggerGameOver(false);
                    return;
                }
            }
            document.getElementById('lives-value').innerText = `❤️ ${lives}`;
            document.getElementById('quiz-overlay').classList.remove('active');
            eggs = []; isQuizMode = false;
        }

        function draw() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
            for (let i = 0; i < 20; i++) {
                let starX = (Math.sin(i * 99) + 1) * 0.5 * WIDTH;
                let starY = ((Date.now() * 0.04 + i * 60) % HEIGHT);
                ctx.fillRect(starX, starY, 2, 2);
            }

            if (!isQuizMode && !isMenuMode) {
                ctx.save(); ctx.translate(player.x, player.y);
                let fireH = 8 + Math.random() * 8;
                let grad = ctx.createLinearGradient(0, 12, 0, 12 + fireH);
                grad.addColorStop(0, '#f97316'); grad.addColorStop(1, 'rgba(239, 68, 68, 0)');
                ctx.fillStyle = grad; ctx.fillRect(-5, 12, 10, fireH);
                ctx.fillStyle = '#cbd5e1'; ctx.beginPath(); ctx.moveTo(0, -15); ctx.lineTo(16, 12); ctx.lineTo(-16, 12); ctx.closePath(); ctx.fill();
                ctx.fillStyle = '#0ea5e9'; ctx.fillRect(-20, 4, 6, 8); ctx.fillRect(14, 4, 6, 8);
                ctx.fillStyle = '#38bdf8'; ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }

            chickens.forEach(chick => {
                ctx.save(); ctx.translate(chick.x, chick.y);
                let wing = Math.sin(Date.now() * 0.01 + chick.x) * 6;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.ellipse(-14, 0, 8, 5 + wing/2, Math.PI/4, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(14, 0, 8, 5 + wing/2, -Math.PI/4, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#22c55e'; ctx.beginPath(); ctx.arc(0, 2, 11, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.arc(0, -9, 5, 0, Math.PI * 2); ctx.fill(); ctx.fillRect(-2, -15, 4, 5);
                ctx.fillStyle = '#eab308'; ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(-3, -5); ctx.lineTo(3, -5); ctx.closePath(); ctx.fill();
                ctx.restore();
            });

            ctx.fillStyle = '#f8fafc';
            eggs.forEach(egg => {
                ctx.save(); ctx.translate(egg.x, egg.y); ctx.beginPath(); ctx.ellipse(0, 0, 5, 7, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();
            });

            ctx.fillStyle = '#f43f5e';
            bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2); ctx.fill(); });

            particles.forEach(p => {
                ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill(); ctx.restore();
            });

            // Vẽ văn bản chữ nổi hiệu ứng +50đ lên màn hình canvas
            scorePopups.forEach(pop => {
                ctx.save();
                ctx.globalAlpha = pop.alpha;
                ctx.fillStyle = '#22c55e';
                ctx.font = 'bold 22px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(pop.text, pop.x, pop.y);
                ctx.restore();
            });
        }

        function mainLoop() { update(); draw(); requestAnimationFrame(mainLoop); }
        mainLoop();
    </script>
</body>
</html>
